name: Deploy Portfolio to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch: {}

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        working-directory: modern-developer-portfolio
        run: npm ci

      - name: Build
        working-directory: modern-developer-portfolio
        run: npm run build

      - name: Ensure .nojekyll
        run: |
          if [ -d "modern-developer-portfolio/dist" ]; then
            touch modern-developer-portfolio/dist/.nojekyll
          fi

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: modern-developer-portfolio/dist
